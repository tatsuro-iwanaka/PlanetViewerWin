name: Build Windows Single EXE

on:
  push:
    branches: [ "main", "master" ] # トリガーとなるブランチ名

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download SPICE Kernels
      shell: pwsh
      run: |
        mkdir -Force spice_kernel

        # 1. 公式パブリックサーバーからの直接取得（Google Driveの警告を完全に回避）
        Write-Output "Downloading naif0012.tls from NAIF..."
        curl.exe -L -o spice_kernel/naif0012.tls https://naif.jpl.nasa.gov/pub/naif/generic_kernels/lsk/naif0012.tls

        Write-Output "Downloading pck00010.tpc from NAIF..."
        curl.exe -L -o spice_kernel/pck00010.tpc https://naif.jpl.nasa.gov/pub/naif/generic_kernels/pck/pck00010.tpc

        Write-Output "Downloading earth_latest_high_prec.bpc from NAIF..."
        curl.exe -L -o spice_kernel/earth_latest_high_prec.bpc https://naif.jpl.nasa.gov/pub/naif/generic_kernels/pck/earth_latest_high_prec.bpc

        Write-Output "Downloading de442.bsp from NAIF (Direct)..."
        curl.exe -L -o spice_kernel/de442.bsp https://naif.jpl.nasa.gov/pub/naif/generic_kernels/spk/planets/de442.bsp

        Write-Output "Downloading gm_de440.tpc from NAIF..."
        curl.exe -L -o spice_kernel/gm_de440.tpc https://naif.jpl.nasa.gov/pub/naif/generic_kernels/pck/gm_de440.tpc

        # 2. Google Drive（中容量：スキャン警告なし）
        Write-Output "Downloading earth_2025_250826_2125_predict.bpc..."
        curl.exe -L -o spice_kernel/earth_2025_250826_2125_predict.bpc "https://drive.google.com/uc?export=download&id=11pWdOQS50RlpfPhJytukCnyXdAEUoAgv"

        Write-Output "Downloading earth_1962_250826_2125_combined.bpc..."
        curl.exe -L -o spice_kernel/earth_1962_250826_2125_combined.bpc "https://drive.google.com/uc?export=download&id=1imoKimsJvCKXgVHY4xiSmhI8L6LgYwQH"

        # 3. Google Drive（大容量：スキャン警告あり、HTMLから正規表現で直接コードを抽出）
        Write-Output "Downloading jup365_subset.bsp..."
        $JUP_ID = "12jyDW1jjQyZdEQWQv8UpKkLMeUJ0ibV6"
        
        # 1回目：警告HTMLを一時ファイルとして取得
        curl.exe -Lc gdrive_cookie.txt "https://drive.google.com/uc?export=download&id=$JUP_ID" -o jup_temp.html
        
        # HTMLの文字列を走査し、confirm=XXXX のパターンを検索
        $htmlContent = Get-Content -Raw jup_temp.html
        if ($htmlContent -match 'confirm=([0-9a-zA-Z_-]+)') {
            $CONFIRM_CODE = $Matches[1]
            Write-Output "Confirm code successfully detected. Re-downloading payload..."
            # 2回目：抽出した確認コードを付与して本番データを取得（上書き）
            curl.exe -Lb gdrive_cookie.txt "https://drive.google.com/uc?export=download&confirm=$CONFIRM_CODE&id=$JUP_ID" -o spice_kernel/jup365_subset.bsp
        } else {
            # 警告が発生しなかった場合は一時ファイルをそのまま正規パスへ移行
            Move-Item jup_temp.html spice_kernel/jup365_subset.bsp -Force
        }
        
        # 不要になった一時管理ファイルの削除
        Remove-Item jup_temp.html -ErrorAction SilentlyContinue
        Remove-Item gdrive_cookie.txt -ErrorAction SilentlyContinue

        Write-Output "All kernels verification and download complete."

    # ビルド高速化のためのキャッシュ機構
    - name: Restore vcpkg cache
      uses: actions/cache@v4
      with:
        path: $VCPKG_INSTALLATION_ROOT/downloads
        key: vcpkg-windows-cache-${{ hashFiles('CMakeLists.txt') }}
        
    # vcpkgを使用して、Windows用の全依存関係をスタティック形式で一括インストール
    - name: Install Dependencies via vcpkg
      run: |
        $env:VCPKG_DEFAULT_TRIPLET="x64-windows-static"
        vcpkg install glfw3 opencv4 cspice

    # CMakeの構成設定（vcpkgのツールチェーンを結合）
    - name: Configure CMake
      run: |
        cmake -B build -S . `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows-static

    # 完全に独立した単一の .exe バイナリのビルド実行
    - name: Build Project
      run: cmake --build build --config Release

    # 生成されたEXEファイルをGitHubのWebUIからダウンロード可能にする
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PlanetViewer-Windows-x64-Single
        path: build/Release/PlanetViewer.exe
