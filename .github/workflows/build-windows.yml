name: Build Windows Single EXE

on:
  push:
    branches: [ "main", "master" ] # トリガーとなるブランチ名

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ---- 【指示通り：Google Drive完全統一版】ビルド時カーネル自動ダウンロードステップ ----
    - name: Download SPICE Kernels
      shell: pwsh
      run: |
        mkdir -Force spice_kernel

        # クッキーの末尾構造から4文字の確認コードを確実にパースする強靭化関数
        function Download-FromGDrive {
            param (
                [string]$FileId,
                [string]$OutPath
            )
            # 1次試行：クッキーを保存しつつ、一度ダウンロードを要求
            curl.exe -Lc cookie.txt "https://drive.google.com/uc?export=download&id=$FileId" -o $OutPath

            if (Test-Path cookie.txt) {
                # クッキーの内容を走査
                foreach ($line in Get-Content cookie.txt) {
                    # 警告記述（_warning_）が存在し、その末尾にある4文字の英数字コードを正規表現で捕捉
                    if ($line -match '_warning_.*\s+([A-Za-z0-9]{4})\s*$') {
                        $CODE = $Matches[1]
                        Write-Output "Warning cleared for ID: $FileId (Code: $CODE). Re-downloading..."
                        
                        # 抽出した確認コードを用いて本番データを上書き取得
                        curl.exe -Lb cookie.txt "https://drive.google.com/uc?export=download&confirm=$CODE&id=$FileId" -o $OutPath
                        break
                    }
                }
                Remove-Item cookie.txt -ErrorAction SilentlyContinue
            }
        }

        # 提示された全8ファイルのGoogle Drive IDによるシーケンシャル・ダウンロード
        Write-Output "Downloading naif0012.tls..."
        Download-FromGDrive "1obQviGyym4dtEMsgENteACCZxEKMG0BS" "spice_kernel/naif0012.tls"

        Write-Output "Downloading pck00010.tpc..."
        Download-FromGDrive "1Xm56M5ooSE4oXzV3TlJ6LeDv72T3Ufrq" "spice_kernel/pck00010.tpc"

        Write-Output "Downloading earth_latest_high_prec.bpc..."
        Download-FromGDrive "1dyBV3Fff4VlGR-DKeOvBzN6Zvcg6vm1O" "spice_kernel/earth_latest_high_prec.bpc"

        Write-Output "Downloading de442.bsp..."
        Download-FromGDrive "15vUA4qBKUsjD2Vf_nHfYJ5YjMJnsCMiU" "spice_kernel/de442.bsp"

        Write-Output "Downloading gm_de440.tpc..."
        Download-FromGDrive "1h56iEcIP-1Wxd42MK_CPsJwESP--Qn81" "spice_kernel/gm_de440.tpc"

        Write-Output "Downloading earth_2025_250826_2125_predict.bpc..."
        Download-FromGDrive "11pWdOQS50RlpfPhJytukCnyXdAEUoAgv" "spice_kernel/earth_2025_250826_2125_predict.bpc"

        Write-Output "Downloading earth_1962_250826_2125_combined.bpc..."
        Download-FromGDrive "1imoKimsJvCKXgVHY4xiSmhI8L6LgYwQH" "spice_kernel/earth_1962_250826_2125_combined.bpc"

        Write-Output "Downloading jup365_subset.bsp..."
        Download-FromGDrive "12jyDW1jjQyZdEQWQv8UpKkLMeUJ0ibV6" "spice_kernel/jup365_subset.bsp"

        Write-Output "All kernels downloaded from Google Drive."

    # ビルド高速化のためのキャッシュ機構
    - name: Restore vcpkg cache
      uses: actions/cache@v4
      with:
        path: $VCPKG_INSTALLATION_ROOT/downloads
        key: vcpkg-windows-cache-${{ hashFiles('CMakeLists.txt') }}
        
    # vcpkgを使用して、Windows用の全依存関係をスタティック形式で一括インストール
    - name: Install Dependencies via vcpkg
      run: |
        $env:VCPKG_DEFAULT_TRIPLET="x64-windows-static"
        vcpkg install glfw3 opencv4 cspice

    # CMakeの構成設定（vcpkgのツールチェーンを結合）
    - name: Configure CMake
      run: |
        cmake -B build -S . `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows-static

    # 完全に独立した単一の .exe バイナリのビルド実行
    - name: Build Project
      run: cmake --build build --config Release

    # 生成されたEXEファイルをGitHubのWebUIからダウンロード可能にする
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PlanetViewer-Windows-x64-Single
        path: build/Release/PlanetViewer.exe
