- name: Download SPICE Kernels
      shell: pwsh
      run: |
        mkdir -Force spice_kernel

        # クッキーファイルから正確に確認コードを抽出する修正関数
        function Download-FromGDrive {
            param (
                [string]$FileId,
                [string]$OutPath
            )
            # 1次試行：クッキーを保存しつつダウンロードを試みる（大容量ファイルはここで2KBの警告HTMLになる）
            curl.exe -Lc cookie.txt "https://drive.google.com/uc?export=download&id=$FileId" -o $OutPath

            # クッキーファイルが存在し、かつ警告クッキーが書き込まれているか判定
            if (Test-Path cookie.txt) {
                $warningLine = Get-Content cookie.txt | Select-String "download_warning"
                if ($warningLine) {
                    # クッキーの行を空白で分割し、末尾にある確認コードを抽出
                    $CODE = ($warningLine -split "\s+")[-1]
                    
                    # 抽出した確認コードを使い、本物のバイナリデータを上書きダウンロード
                    curl.exe -Lb cookie.txt "https://drive.google.com/uc?export=download&confirm=$CODE&id=$FileId" -o $OutPath
                }
                Remove-Item cookie.txt -ErrorAction SilentlyContinue
            }
        }

        # 各ファイルの一括ダウンロード実行
        Write-Output "Downloading naif0012.tls..."
        Download-FromGDrive "1obQviGyym4dtEMsgENteACCZxEKMG0BS" "spice_kernel/naif0012.tls"

        Write-Output "Downloading pck00010.tpc..."
        Download-FromGDrive "1Xm56M5ooSE4oXzV3TlJ6LeDv72T3Ufrq" "spice_kernel/pck00010.tpc"

        Write-Output "Downloading earth_latest_high_prec.bpc..."
        Download-FromGDrive "1dyBV3Fff4VlGR-DKeOvBzN6Zvcg6vm1O" "spice_kernel/earth_latest_high_prec.bpc"

        Write-Output "Downloading de442.bsp..."
        Download-FromGDrive "15vUA4qBKUsjD2Vf_nHfYJ5YjMJnsCMiU" "spice_kernel/de442.bsp"

        Write-Output "Downloading gm_de440.tpc..."
        Download-FromGDrive "1h56iEcIP-1Wxd42MK_CPsJwESP--Qn81" "spice_kernel/gm_de440.tpc"

        Write-Output "Downloading earth_2025_250826_2125_predict.bpc..."
        Download-FromGDrive "11pWdOQS50RlpfPhJytukCnyXdAEUoAgv" "spice_kernel/earth_2025_250826_2125_predict.bpc"

        Write-Output "Downloading earth_1962_250826_2125_combined.bpc..."
        Download-FromGDrive "1imoKimsJvCKXgVHY4xiSmhI8L6LgYwQH" "spice_kernel/earth_1962_250826_2125_combined.bpc"

        Write-Output "Downloading jup365_subset.bsp..."
        Download-FromGDrive "12jyDW1jjQyZdEQWQv8UpKkLMeUJ0ibV6" "spice_kernel/jup365_subset.bsp"

        Write-Output "All kernels verification and download complete."
